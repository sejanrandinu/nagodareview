<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>පැමිණිලි සහ ප්‍රතිචාර | Complaints & Reviews</title>
    <meta name="description" content="Submit your feedback and complaints easily.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Sinhala:wght@400;500;600&family=Noto+Sans+Tamil:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/4/4b/Emblem_of_Sri_Lanka.svg" type="image/svg+xml">
</head>
<body>
    <div class="background-shape shape-1"></div>
    <div class="background-shape shape-2"></div>
    <div class="background-shape shape-3"></div>

    <div class="container">
        <header class="header">
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="si">සිංහල</button>
                <button class="lang-btn" data-lang="ta">தமிழ்</button>
                <button class="lang-btn" data-lang="en">English</button>
            </div>
            <h2 id="deptTitleText" class="dept-title">නාගොඩ ප්‍රාදේශීය ලේකම් කාර්යාලය - ආයතන අංශය</h2>
            <h1 id="titleText">පැමිණිලි සහ ප්‍රතිචාර</h1>
        </header>

        <form id="reviewForm" class="review-form">
            
            <div class="rating-section">
                <div class="rating-options">
                    <label class="rating-option" for="rating-very-happy">
                        <input type="radio" name="rating" id="rating-very-happy" value="very-happy" required>
                        <div class="emoji-container">
                            <span class="emoji">🤩</span>
                        </div>
                        <span class="rating-label" id="ratingVeryHappyText">ඉතා හොඳයි</span>
                    </label>

                    <label class="rating-option" for="rating-happy">
                        <input type="radio" name="rating" id="rating-happy" value="happy">
                        <div class="emoji-container">
                            <span class="emoji">😊</span>
                        </div>
                        <span class="rating-label" id="ratingHappyText">හොඳයි</span>
                    </label>

                    <label class="rating-option" for="rating-bad">
                        <input type="radio" name="rating" id="rating-bad" value="bad">
                        <div class="emoji-container">
                            <span class="emoji">😞</span>
                        </div>
                        <span class="rating-label" id="ratingBadText">අසතුටුදායකයි</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="userName" id="nameLabel">නම (කැමති නම් පමණක්)</label>
                <input type="text" id="userName" name="userName" placeholder="ඔබේ නම ඇතුළත් කරන්න">
            </div>

            <div class="form-group">
                <label for="userAddress" id="addressLabel">ලිපිනය (කැමති නම් පමණක්)</label>
                <input type="text" id="userAddress" name="userAddress" placeholder="ඔබේ ලිපිනය ඇතුළත් කරන්න">
            </div>

            <div class="form-group">
                <label for="userPurposeSelect" id="purposeLabel">පැමිණි කාර්යය (කැමති නම් පමණක්)</label>
                <select id="userPurposeSelect" name="userPurposeSelect">
                    <option value="" id="purposeOptionDefault">-- කරුණාකර තෝරන්න --</option>
                    <option value="registry" id="purposeOptionRegistry">රෙජිස්ට්‍රාර් අංශයේ කටයුතු</option>
                    <option value="nic" id="purposeOptionNIC">හැඳුනුම්පත් අංශයේ කටයුතු</option>
                    <option value="timberFelling" id="purposeOptionTimberFelling">දැව හෙළීම් කටයුතු</option>
                    <option value="timberTransport" id="purposeOptionTimberTransport">දැව ප්‍රවාහන කටයුතු</option>
                    <option value="animalTransport" id="purposeOptionAnimalTransport">සතුන් ප්‍රවාහන කටයුතු</option>
                    <option value="businessReg" id="purposeOptionBusinessReg">ව්‍යාපාර ලියාපදිංචි කටයුතු</option>
                    <option value="soilSandStone" id="purposeOptionSoilSandStone">පස්, වැලි, කළුගල් සම්බන්ධ කටයුතු</option>
                    <option value="exciseDuty" id="purposeOptionExciseDuty">සුරාබදු සම්බන්ධ කටයුතු</option>
                    <option value="vehicleFines" id="purposeOptionVehicleFines">වාහන දඩ ගෙවීම පිළිබඳ කටයුතු</option>
                    <option value="touristBungalow" id="purposeOptionTouristBungalow">සංචාරක බංගලා වෙන් කිරීම</option>
                    <option value="informationAct" id="purposeOptionInformationAct">තොරතුරු පනත සම්බන්ධ කටයුතු</option>
                    <option value="incomeCertificate" id="purposeOptionIncomeCertificate">ආදායම් සහතික නිකුත් කිරීම</option>
                    <option value="mahapola" id="purposeOptionMahapola">මහපොළ ශිෂ්‍යත්ව සම්බන්ධ කටයුතු</option>
                    <option value="other" id="purposeOptionOther">වෙනත්</option>
                </select>
            </div>

            <div class="form-group hidden" id="otherPurposeGroup">
                <input type="text" id="userPurposeOther" name="userPurposeOther" placeholder="ඔබ පැමිණි කාර්යය ඇතුළත් කරන්න">
            </div>

            <div class="form-group">
                <label for="userMessage" id="messageLabel">පණිවිඩය (කැමති නම් පමණක්)</label>
                <textarea id="userMessage" name="userMessage" rows="4" placeholder="ඔබේ අදහස මෙහි ලියන්න..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">යොමු කරන්න</button>
        </form>

        <div id="successMessage" class="success-message hidden">
            <div class="success-icon">✨</div>
            <h2 id="thankYouText">ඔබේ ප්‍රතිචාරයට ස්තුතියි!</h2>
            <button id="newReviewBtn" class="new-review-btn">ගොස් තවත් එකක්</button>
        </div>

        <footer class="footer">
            © Copyright 2026. All rights reserved. Designed and developed by B.L.Sejan Randinu ©
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
